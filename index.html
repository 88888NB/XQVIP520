<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝑿𝑸𝑽𝑰𝑷 — 极致体验</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #ec4899;
            --secondary-glow: rgba(236, 72, 153, 0.5);
            --accent: #06b6d4;
            --accent-glow: rgba(6, 182, 212, 0.5);
            --bg-deep: #030307;
            --bg-card: rgba(255, 255, 255, 0.03);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-accent: #a78bfa;
            --nav-height: 80px;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 动态背景层 */
        .universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.3;
            animation: twinkle 4s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.5; }
        }

        /* 流体渐变光球 */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            will-change: transform;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            top: -200px;
            left: -100px;
            animation: float1 20s infinite ease-in-out;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            bottom: -150px;
            right: -100px;
            animation: float2 20s infinite ease-in-out;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float3 20s infinite ease-in-out;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(30px, 50px) scale(1.05); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-40px, 40px) scale(1.05); }
            50% { transform: translate(50px, -30px) scale(0.95); }
            75% { transform: translate(-20px, -40px) scale(1.1); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            25% { transform: translate(-40%, -60%) scale(1.08); }
            50% { transform: translate(-60%, -40%) scale(0.92); }
            75% { transform: translate(-45%, -55%) scale(1.03); }
        }

        /* 网格叠加 */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100px 100px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
        }

        /* 主应用容器 */
        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            height: calc(100vh - var(--nav-height));
            overflow: hidden;
        }

        /* 页面切换系统 */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            opacity: 0;
            transform: perspective(1000px) rotateX(10deg) translateY(50px) scale(0.95);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            will-change: transform, opacity;
        }

        .page.active {
            display: flex;
            opacity: 1;
            transform: perspective(1000px) rotateX(0deg) translateY(0) scale(1);
            pointer-events: all;
        }

        .page.exit {
            opacity: 0;
            transform: perspective(1000px) rotateX(-10deg) translateY(-50px) scale(0.95);
        }

        .page-content {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* 标题样式 - 霓虹渐变 */
        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            text-align: center;
            line-height: 1.1;
            letter-spacing: -0.02em;
            position: relative;
            animation: titleReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            will-change: transform, opacity;
        }

        .hero-title .gradient-text {
            background: linear-gradient(135deg, #fff 0%, var(--text-accent) 50%, var(--secondary) 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 8s ease infinite;
        }

        .hero-title .subtitle {
            display: block;
            font-size: 0.4em;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        @keyframes titleReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* 玻璃卡片 - 高级版本 */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            position: relative;
            overflow: hidden;
            animation: cardFloat 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
            opacity: 0;
            transform: translateY(40px);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            will-change: transform, opacity;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .glass-card:hover::after {
            opacity: 0.3;
        }

        @keyframes cardFloat {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 信息列表 */
        .info-grid {
            display: grid;
            gap: 16px;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .info-row::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .info-row:hover {
            transform: translateX(8px);
            border-color: rgba(139, 92, 246, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .info-row:hover::before {
            opacity: 1;
        }

        .info-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label svg {
            width: 16px;
            height: 16px;
            opacity: 0.6;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'Inter', monospace;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-left: 8px;
        }

        .badge-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .badge-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 主按钮 - 霓虹效果 */
        .cta-button {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 400px;
            padding: 20px 40px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.125rem;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            animation: buttonReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
            opacity: 0;
            transform: translateY(30px);
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                0 10px 40px -10px var(--primary-glow);
            will-change: transform, opacity;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .cta-button:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.2) inset,
                0 20px 60px -15px var(--primary-glow);
        }

        .cta-button:hover::before {
            transform: translateX(100%);
        }

        .cta-button:active {
            transform: translateY(-2px) scale(0.98);
        }

        .cta-button svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s;
        }

        .cta-button:hover svg {
            transform: translateX(4px);
        }

        @keyframes buttonReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 底部导航 - 悬浮Dock风格 */
        .dock {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            gap: 8px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        .dock-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 16px 24px;
            min-width: 80px;
            border-radius: 16px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: transparent;
            border: none;
            font-family: inherit;
        }

        .dock-item::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .dock-item:hover {
            color: var(--text-primary);
            transform: translateY(-4px);
        }

        .dock-item:hover::before {
            opacity: 1;
        }

        .dock-item.active {
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 30px -10px var(--primary-glow);
        }

        .dock-item.active::before {
            display: none;
        }

        .dock-icon {
            font-size: 1.5rem;
            line-height: 1;
            transition: transform 0.3s;
        }

        .dock-item:hover .dock-icon {
            transform: scale(1.2);
        }

        .dock-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* 装饰元素 */
        .glow-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            filter: blur(60px);
            pointer-events: none;
            opacity: 0.5;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            :root { --nav-height: 100px; }

            .dock {
                bottom: 16px;
                padding: 8px;
                gap: 4px;
                width: calc(100% - 32px);
                max-width: 400px;
            }

            .dock-item {
                padding: 12px 16px;
                min-width: 0;
                flex: 1;
            }

            .dock-label {
                font-size: 0.7rem;
            }

            .glass-card {
                padding: 24px;
            }

            .hero-title {
                font-size: 2rem;
            }

            .page {
                padding: 20px 16px;
            }

            .page-content {
                gap: 24px;
            }

            .qq-group-card {
                padding: 16px 20px;
            }

            .qq-group-icon {
                width: 40px;
                height: 40px;
            }

            .qq-group-name {
                font-size: 1rem;
            }
        }

        /* 特殊效果 - 扫描线 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        /* 粒子效果容器 */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* QQ群卡片样式 */
        .qq-group-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .qq-group-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: cardFloat 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            opacity: 0;
            transform: translateY(40px);
            will-change: transform, opacity;
        }

        .qq-group-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .qq-group-card:hover::before {
            opacity: 1;
        }

        .qq-group-card.primary {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.2);
        }

        .qq-group-card.primary:hover {
            border-color: rgba(139, 92, 246, 0.8);
            box-shadow: 0 12px 40px rgba(139, 92, 246, 0.4);
            transform: translateY(-4px) scale(1.02);
        }

        .qq-group-card.secondary {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .qq-group-card.secondary:hover {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            transform: translateY(-4px) scale(1.02);
        }

        .qq-group-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            flex-shrink: 0;
        }

        .qq-group-card.primary .qq-group-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        .qq-group-card.secondary .qq-group-icon {
            background: rgba(255, 255, 255, 0.1);
        }

        .qq-group-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .qq-group-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .qq-group-name {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .qq-group-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .qq-group-card.primary .qq-group-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .qq-group-card.secondary .qq-group-badge {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .qq-group-arrow {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .qq-group-card:hover .qq-group-arrow {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(4px);
        }

        .qq-group-arrow svg {
            width: 18px;
            height: 18px;
            color: var(--text-secondary);
        }

        .qq-group-card:hover .qq-group-arrow svg {
            color: var(--text-primary);
        }

        /* 减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- 宇宙背景 -->
    <div class="universe">
        <div class="stars"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="scanline"></div>
    <canvas id="particles"></canvas>

    <!-- 主应用 -->
    <div id="app">
        <!-- 下载中心 -->
        <section class="page active" id="download">
            <div class="glow-orb" style="top: 20%; left: 10%;"></div>
            <div class="page-content">
                <h1 class="hero-title">
                    <span class="gradient-text">𝑿𝑸𝑽𝑰𝑷</span>
                    <span class="subtitle">资源下载中心</span>
                </h1>

                <div class="glass-card">
                    <div class="info-grid">
                        <div class="info-row">
                            <span class="info-label">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                                    <polyline points="13 2 13 9 20 9"></polyline>
                                </svg>
                                文件名称
                            </span>
                            <span class="info-value">XQVIP 更新网盘</span>
                        </div>
                    </div>
                </div>

                <a href="https://www.123684.com/s/HzNlVv-PlEQh" target="_blank" rel="noopener noreferrer" class="cta-button">
                    <span>立即下载</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <polyline points="19 12 12 19 5 12"></polyline>
                    </svg>
                </a>
            </div>
        </section>

    <script>
        // 页面切换系统 - 修复版
        (function() {
            const dockItems = document.querySelectorAll('.dock-item');
            const pages = document.querySelectorAll('.page');
            let isTransitioning = false;

            dockItems.forEach(item => {
                item.addEventListener('click', () => {
                    if (isTransitioning) return;

                    const targetId = item.dataset.target;
                    if (item.classList.contains('active')) return;

                    isTransitioning = true;

                    // 切换导航状态
                    dockItems.forEach(nav => nav.classList.remove('active'));
                    item.classList.add('active');

                    // 找到当前活动的页面
                    const currentPage = document.querySelector('.page.active');
                    const targetPage = document.getElementById(targetId);

                    if (currentPage) {
                        // 当前页面退出动画
                        currentPage.classList.add('exit');

                        setTimeout(() => {
                            currentPage.classList.remove('active', 'exit');
                            // 新页面进入
                            targetPage.classList.add('active');
                            isTransitioning = false;
                        }, 400);
                    } else {
                        targetPage.classList.add('active');
                        isTransitioning = false;
                    }
                });
            });
        })();

        // 鼠标视差效果 - 节流优化版
        (function() {
            const orbs = document.querySelectorAll('.orb');
            let ticking = false;
            let lastX = 0.5;
            let lastY = 0.5;

            document.addEventListener('mousemove', (e) => {
                lastX = e.clientX / window.innerWidth;
                lastY = e.clientY / window.innerHeight;

                if (!ticking) {
                    window.requestAnimationFrame(() => {
                        orbs.forEach((orb, index) => {
                            const speed = (index + 1) * 20;
                            const xOffset = (lastX - 0.5) * speed;
                            const yOffset = (lastY - 0.5) * speed;
                            orb.style.transform = `translate(${xOffset}px, ${yOffset}px) scale(${1 + index * 0.1})`;
                        });
                        ticking = false;
                    });
                    ticking = true;
                }
            });
        })();

        // 粒子效果 - 性能优化版
        (function() {
            const canvas = document.getElementById('particles');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            let particles = [];
            let animationId = null;
            let isVisible = true;

            // 检测页面可见性
            document.addEventListener('visibilitychange', () => {
                isVisible = !document.hidden;
                if (isVisible && !animationId) {
                    animateParticles();
                }
            });

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            resizeCanvas();

            // 防抖resize
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(resizeCanvas, 100);
            });

            // 根据屏幕大小调整粒子数量
            const isMobile = window.matchMedia('(pointer: coarse)').matches;
            const particleCount = isMobile ? 25 : 50;

            class Particle {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = (Math.random() - 0.5) * 0.5;
                    this.opacity = Math.random() * 0.5 + 0.1;
                }

                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;

                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.y > canvas.height) this.y = 0;
                    if (this.y < 0) this.y = canvas.height;
                }

                draw() {
                    ctx.fillStyle = `rgba(139, 92, 246, ${this.opacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            let frameCount = 0;
            function animateParticles() {
                if (!isVisible) {
                    animationId = null;
                    return;
                }

                animationId = requestAnimationFrame(animateParticles);

                // 每2帧渲染一次以提高性能
                frameCount++;
                if (frameCount % 2 !== 0) return;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });
            }

            initParticles();
            animateParticles();
        })();
    </script>
